<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b1d2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Abeam — Canadian Mariner's Pocket Reference</title>
<style>
  :root {
    --bg: #0b1d2a;
    --bg2: #10293a;
    --card: #14324a;
    --card-edge: #1e4562;
    --ink: #e8f1f8;
    --ink-dim: #9db8cc;
    --accent: #ffb703;
    --accent2: #4cc9f0;
    --good: #52b788;
    --bad: #e5636f;
    --red-light: #ff4d4d;
    --green-light: #3ddc84;
    --white-light: #ffffff;
    --yellow-light: #ffd166;
    --tap: rgba(76, 201, 240, 0.15);
  }
  [data-theme="day"] {
    --bg: #eef4f8;
    --bg2: #e2ebf2;
    --card: #ffffff;
    --card-edge: #c9d9e4;
    --ink: #12283a;
    --ink-dim: #55708a;
    --accent: #c77800;
    --accent2: #0077b6;
    --tap: rgba(0, 119, 182, 0.1);
  }
  [data-theme="night"] {
    --bg: #000000;
    --bg2: #0d0000;
    --card: #1a0505;
    --card-edge: #3d0f0f;
    --ink: #ff5a5a;
    --ink-dim: #a83232;
    --accent: #ff5a5a;
    --accent2: #ff5a5a;
    --good: #ff5a5a;
    --bad: #ff5a5a;
    --green-light: #7a2626;
    --white-light: #ff8080;
    --yellow-light: #cc4444;
    --tap: rgba(255, 90, 90, 0.12);
  }
  [data-theme="night"] img, [data-theme="night"] .flag { filter: grayscale(1) brightness(0.6) sepia(1) hue-rotate(-50deg) saturate(4); }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body {
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding-bottom: calc(64px + env(safe-area-inset-bottom));
    min-height: 100vh;
    transition: background 0.25s, color 0.25s;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky; top: 0; z-index: 20;
    background: var(--bg);
    padding: calc(10px + env(safe-area-inset-top)) 14px 8px;
    border-bottom: 1px solid var(--card-edge);
  }
  .header-row { display: flex; align-items: center; gap: 10px; }
  .brand { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.3px; flex: 1; }
  .brand small { display: block; font-size: 0.65rem; font-weight: 500; color: var(--ink-dim); letter-spacing: 0.5px; }
  .theme-btn {
    background: var(--card); color: var(--ink); border: 1px solid var(--card-edge);
    border-radius: 20px; padding: 7px 13px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
  }
  .searchbar {
    margin-top: 8px; display: none;
  }
  .searchbar input {
    width: 100%; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--card-edge);
    background: var(--bg2); color: var(--ink); font-size: 1rem; outline: none;
  }
  .searchbar input::placeholder { color: var(--ink-dim); }

  /* ---------- Layout ---------- */
  main { padding: 12px 14px 20px; max-width: 640px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }
  h2 {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--accent); margin: 18px 0 8px; font-weight: 700;
  }
  h2:first-child { margin-top: 4px; }

  .card {
    background: var(--card); border: 1px solid var(--card-edge); border-radius: 14px;
    padding: 12px 14px; margin-bottom: 8px;
    overflow-x: auto;
  }
  .card.hidden { display: none; }
  .card-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
  .card-sub { font-size: 0.83rem; color: var(--ink-dim); line-height: 1.45; }
  .card-note { font-size: 0.78rem; color: var(--accent2); margin-top: 6px; font-style: italic; }
  .card-flex { display: flex; align-items: center; gap: 14px; }
  .card-flex .grow { flex: 1; min-width: 0; }

  /* ---------- Light diagrams ---------- */
  .lights { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 44px; }
  .lights-row { display: flex; gap: 5px; }
  .dot {
    width: 15px; height: 15px; border-radius: 50%;
    box-shadow: 0 0 8px 1px currentColor;
  }
  .dot.r { background: var(--red-light); color: var(--red-light); }
  .dot.g { background: var(--green-light); color: var(--green-light); }
  .dot.w { background: var(--white-light); color: var(--white-light); }
  .dot.y { background: var(--yellow-light); color: var(--yellow-light); }
  [data-theme="day"] .dot { box-shadow: 0 0 0 1px rgba(0,0,0,0.25) inset; }
  [data-theme="day"] .dot.w { box-shadow: 0 0 0 1.5px #99a inset; }

  .shape { font-size: 1.7rem; line-height: 1.1; min-width: 44px; text-align: center; color: var(--ink); }

  /* ---------- Sound signal notation ---------- */
  .blast { display: inline-flex; gap: 4px; align-items: center; margin-right: 8px; }
  .short-b, .long-b { height: 10px; border-radius: 5px; background: var(--accent); display: inline-block; }
  .short-b { width: 10px; }
  .long-b { width: 34px; }

  /* ---------- Tables ---------- */
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; font-variant-numeric: tabular-nums; }
  th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--card-edge); vertical-align: top; }
  th { color: var(--accent); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; }
  tr:last-child td { border-bottom: none; }
  .ch { font-weight: 700; color: var(--accent2); white-space: nowrap; }

  /* ---------- Script blocks (radio) ---------- */
  .script {
    background: var(--bg2); border-radius: 10px; padding: 10px 12px; margin-top: 8px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.8rem; line-height: 1.7;
    white-space: pre-wrap; color: var(--ink);
    border-left: 3px solid var(--accent);
  }
  .script b { color: var(--accent); }

  /* ---------- Buoys ---------- */
  .buoy-swatch {
    min-width: 30px; width: 30px; height: 46px; border-radius: 5px 5px 8px 8px;
    border: 1px solid rgba(0,0,0,0.35); flex-shrink: 0;
  }
  .topmark { text-align: center; font-size: 0.85rem; line-height: 1; margin-bottom: 2px; }

  /* ---------- Tools ---------- */
  .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink-dim); margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; padding: 11px 12px; border-radius: 10px; border: 1px solid var(--card-edge);
    background: var(--bg2); color: var(--ink); font-size: 1.05rem; outline: none;
  }
  .result-box {
    background: var(--bg2); border-radius: 10px; padding: 10px 12px; margin-top: 4px;
    font-size: 0.95rem; line-height: 1.8;
  }
  .result-box b { color: var(--accent); }
  .btn {
    display: block; width: 100%; padding: 13px; border: none; border-radius: 12px;
    background: var(--accent); color: #10202e; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 6px;
  }
  [data-theme="night"] .btn { background: #5c1010; color: var(--ink); }

  /* ---------- Quiz ---------- */
  .quiz-q { font-size: 1.05rem; font-weight: 600; line-height: 1.5; margin-bottom: 14px; }
  .quiz-opt {
    display: block; width: 100%; text-align: left; padding: 13px 14px; margin-bottom: 8px;
    background: var(--bg2); color: var(--ink); border: 1.5px solid var(--card-edge);
    border-radius: 12px; font-size: 0.95rem; cursor: pointer; line-height: 1.4;
  }
  .quiz-opt:active { background: var(--tap); }
  .quiz-opt.correct { border-color: var(--good); background: rgba(82,183,136,0.15); }
  .quiz-opt.wrong { border-color: var(--bad); background: rgba(229,99,111,0.15); }
  .quiz-meta { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--ink-dim); margin-bottom: 10px; }
  .quiz-cat { color: var(--accent2); font-weight: 600; }
  .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .pill {
    padding: 8px 14px; border-radius: 20px; border: 1px solid var(--card-edge);
    background: var(--card); color: var(--ink); font-size: 0.82rem; font-weight: 600; cursor: pointer;
  }
  .pill.on { background: var(--accent); color: #10202e; border-color: var(--accent); }
  [data-theme="night"] .pill.on { background: #5c1010; color: var(--ink); }

  /* ---------- Bottom nav ---------- */
  nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    display: flex; background: var(--bg2); border-top: 1px solid var(--card-edge);
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav button {
    flex: 1; background: none; border: none; color: var(--ink-dim);
    padding: 9px 2px 7px; font-size: 0.62rem; font-weight: 600; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    letter-spacing: 0.3px;
  }
  nav button .ico { font-size: 1.25rem; line-height: 1; }
  nav button.active { color: var(--accent); }

  .footer-note { text-align: center; font-size: 0.7rem; color: var(--ink-dim); margin-top: 24px; line-height: 1.6; padding: 0 10px; }
</style>
</head>
<body data-theme="dusk">

<header>
  <div class="header-row">
    <div class="brand">⚓ Abeam<small>CANADIAN MARINER'S POCKET REFERENCE</small></div>
    <button class="theme-btn" id="themeBtn" onclick="cycleTheme()">🌘 Dusk</button>
  </div>
  <div class="searchbar" id="searchbar">
    <input type="search" id="searchInput" placeholder="Filter this section…" oninput="filterCards(this.value)">
  </div>
</header>

<main>
  <div class="section" id="sec-rules"></div>
  <div class="section" id="sec-radio"></div>
  <div class="section" id="sec-cip"></div>
  <div class="section" id="sec-buoys"></div>
  <div class="section" id="sec-tools"></div>
  <div class="section" id="sec-study"></div>
</main>

<nav>
  <button data-sec="radio" onclick="go('radio')"><span class="ico">📻</span>Radio</button>
  <button data-sec="cip" onclick="go('cip')"><span class="ico">📍</span>CIPs</button>
  <button data-sec="buoys" onclick="go('buoys')"><span class="ico">🛟</span>Buoyage</button>
  <button data-sec="rules" onclick="go('rules')"><span class="ico">🚢</span>Rules</button>
  <button data-sec="tools" onclick="go('tools')"><span class="ico">🧮</span>Tools</button>
  <button data-sec="study" onclick="go('study')"><span class="ico">🎓</span>Study</button>
</nav>

<script>
/* ============================================================
   WHEELHOUSE — data-driven pocket reference for Canadian mariners
   All content renders from the data objects below.
   ============================================================ */

/* ---------- helpers ---------- */
const el = id => document.getElementById(id);
const dots = pattern => {
  // pattern: rows top→bottom, e.g. [["r"],["w"],["g","r"]]
  return '<div class="lights">' + pattern.map(row =>
    '<div class="lights-row">' + row.map(c => `<span class="dot ${c}"></span>`).join('') + '</div>'
  ).join('') + '</div>';
};
const blasts = seq => {
  // seq: "S" short, "L" long/prolonged, e.g. "LSS"
  return '<span class="blast">' + [...seq].map(b =>
    `<span class="${b === 'S' ? 'short-b' : 'long-b'}"></span>`
  ).join('') + '</span>';
};
const card = (title, sub, visual = '', note = '') => `
  <div class="card" data-search="${(title + ' ' + sub + ' ' + note).toLowerCase().replace(/"/g, '')}">
    <div class="card-flex">
      ${visual}
      <div class="grow">
        <div class="card-title">${title}</div>
        <div class="card-sub">${sub}</div>
        ${note ? `<div class="card-note">${note}</div>` : ''}
      </div>
    </div>
  </div>`;

/* ============================================================
   SECTION: RULES (COLREGs quick reference)
   ============================================================ */
const NAV_LIGHTS = [
  ["Power-driven vessel < 50 m", "Masthead light, sidelights, sternlight.", [["w"],["g","r"]], "Rule 23"],
  ["Power-driven vessel ≥ 50 m", "Two masthead lights (forward lower, after higher), sidelights, sternlight.", [["w"],["w"],["g","r"]], "Rule 23"],
  ["Sailing vessel underway", "Sidelights and sternlight only — no masthead light. May add all-round red over green at masthead.", [["g","r"]], "Rule 25 · Under sail AND power = show lights of a power vessel + cone shape"],
  ["Vessel trawling", "Green over white all-round, plus masthead light if ≥ 50 m; sidelights & sternlight when making way.", [["g"],["w"]], "Rule 26 · \"Green over white — trawling tonight\""],
  ["Fishing (other than trawling)", "Red over white all-round; if gear extends > 150 m, all-round white toward the gear.", [["r"],["w"]], "Rule 26 · \"Red over white — fishing tonight\""],
  ["Not under command (NUC)", "Two all-round red in a vertical line; sidelights & sternlight when making way.", [["r"],["r"]], "Rule 27 · \"Red over red — the captain is dead\""],
  ["Restricted in ability to manoeuvre (RAM)", "Red–white–red all-round in a vertical line, plus normal underway or anchor lights.", [["r"],["w"],["r"]], "Rule 27"],
  ["Constrained by draught", "Three all-round red in a vertical line, in addition to power-vessel lights.", [["r"],["r"],["r"]], "Rule 28"],
  ["Pilot vessel on duty", "White over red all-round at masthead; underway also sidelights & sternlight.", [["w"],["r"]], "Rule 29 · \"White over red — pilot ahead\""],
  ["Vessel at anchor", "All-round white where best seen; ≥ 50 m: second all-round white aft, lower; ≥ 100 m also light the decks.", [["w"]], "Rule 30"],
  ["Vessel aground", "Anchor light(s) plus two all-round red in a vertical line.", [["r"],["r"],["w"]], "Rule 30"],
  ["Towing — tow ≤ 200 m", "Two masthead lights in a vertical line, sidelights, sternlight, yellow towing light above sternlight.", [["w"],["w"],["y"]], "Rule 24 · Three masthead lights when tow exceeds 200 m"],
];

const DAY_SHAPES = [
  ["At anchor", "One black ball forward, where best seen.", "●"],
  ["Not under command", "Two black balls in a vertical line.", "●<br>●"],
  ["Restricted in ability to manoeuvre", "Ball – diamond – ball in a vertical line.", "●<br>◆<br>●"],
  ["Aground", "Three black balls in a vertical line.", "●<br>●<br>●"],
  ["Constrained by draught", "A black cylinder.", "▮"],
  ["Sailing vessel under power (motor-sailing)", "A black cone, apex downward, forward.", "▼"],
  ["Vessel fishing / trawling", "Two black cones, apexes together (hourglass).", "▼<br>▲"],
  ["Vessel towing, tow > 200 m", "A black diamond on both towing vessel and tow.", "◆"],
];

const SOUND_MANOEUVRE = [
  ["I am altering course to STARBOARD", "S"],
  ["I am altering course to PORT", "SS"],
  ["My engines are going ASTERN", "SSS"],
  ["DANGER / I do not understand your intentions", "SSSSS"],
  ["Narrow channel: I intend to overtake on your STARBOARD side", "LLS"],
  ["Narrow channel: I intend to overtake on your PORT side", "LLSS"],
  ["Agreement to be overtaken", "LSLS"],
  ["Approaching a blind bend", "L"],
];

const SOUND_FOG = [
  ["Power vessel making way", "One prolonged blast, every ≤ 2 min", "L"],
  ["Power vessel underway, stopped", "Two prolonged blasts, every ≤ 2 min", "LL"],
  ["NUC, RAM, constrained by draught, sailing, fishing, towing", "One prolonged + two short, every ≤ 2 min", "LSS"],
  ["Last vessel of a manned tow", "One prolonged + three short (after the towing vessel's signal)", "LSSS"],
  ["At anchor < 100 m", "Rapid bell ~5 s, every ≤ 1 min", ""],
  ["At anchor ≥ 100 m", "Bell forward, then gong aft, every ≤ 1 min", ""],
  ["Aground", "Three distinct bell strokes + anchor signal + three strokes", ""],
  ["Pilot vessel on duty", "May add four short blasts to its fog signal", "SSSS"],
];

function renderRules() {
  let html = '<h2>Responsibility hierarchy — Rule 18</h2>';
  html += card("The pecking order (give-way priority)",
    "Not Under Command → Restricted in Ability to Manoeuvre → Constrained by Draught → Fishing → Sailing → Power-driven → Seaplane / WIG. Each vessel keeps clear of every vessel above it on the list.",
    '<div class="shape">⚖️</div>',
    "Mnemonic: “New Reels Catch Fish So Purchase Some”");
  html += card("Head-on — Rule 14", "Two power vessels meeting head-on: BOTH alter course to starboard, pass port-to-port.", '<div class="shape">↔️</div>');
  html += card("Crossing — Rule 15", "Power vessel with the other on her STARBOARD side gives way — and should avoid crossing ahead. If you see her red sidelight at night, she's on your starboard: give way.", '<div class="shape">✖️</div>', "“If to starboard red appear, 'tis your duty to keep clear.”");
  html += card("Overtaking — Rule 13", "ANY vessel overtaking (approaching from more than 22.5° abaft the beam) keeps clear — even sail overtaking power. At night: you see only her sternlight.", '<div class="shape">⏩</div>');
  html += card("Stand-on vessel — Rule 17", "Hold course and speed. You MAY act as soon as it's apparent the give-way vessel isn't acting; you MUST act when collision can't be avoided by the give-way vessel alone. Avoid altering to port for a vessel on your own port side.", '<div class="shape">🧭</div>');
  html += card("Safe speed & lookout — Rules 5, 6, 7", "Maintain a proper lookout by sight and hearing at all times. Proceed at a speed allowing effective action and a stop within an appropriate distance. Risk of collision exists if compass bearing of an approaching vessel does not appreciably change.", '<div class="shape">👁️</div>');

  html += '<h2>Navigation lights</h2>';
  for (const [t, s, d, n] of NAV_LIGHTS) html += card(t, s, dots(d), n);

  html += '<h2>Day shapes</h2>';
  for (const [t, s, g] of DAY_SHAPES) html += card(t, s, `<div class="shape">${g}</div>`);

  html += '<h2>Sound signals — manoeuvring (Rule 34)</h2>';
  for (const [t, seq] of SOUND_MANOEUVRE)
    html += card(t, blasts(seq) + `<span style="color:var(--ink-dim)">${[...seq].map(b => b === 'S' ? 'short' : 'prolonged').join(' · ')}</span>`);

  html += '<h2>Sound signals — restricted visibility (Rule 35)</h2>';
  for (const [t, s, seq] of SOUND_FOG)
    html += card(t, (seq ? blasts(seq) + ' ' : '') + s);

  html += '<div class="footer-note">Quick reference only — always consult the current Collision Regulations (C.R.C., c. 1416) with Canadian modifications.</div>';
  el('sec-rules').innerHTML = html;
}

/* ============================================================
   SECTION: RADIO
   ============================================================ */
const VHF_CHANNELS = [
  ["16", "156.800", "DISTRESS, URGENCY, SAFETY and calling. Mandatory listening watch underway."],
  ["70", "156.525", "DSC — digital selective calling only (distress alerting). No voice."],
  ["06", "156.300", "Intership safety, search & rescue coordination."],
  ["13", "156.650", "Bridge-to-bridge navigation safety (1 W). Vessel traffic in some zones."],
  ["09", "156.450", "Pleasure craft calling (heavy-traffic areas); commercial intership."],
  ["10", "156.500", "Intership/coast — safety, SAR, some CCG operations."],
  ["83A", "157.175", "Canadian Coast Guard working channel."],
  ["22A", "157.100", "CCG liaison and Maritime Safety Information after announcement on 16."],
  ["11 / 12 / 14", "—", "Vessel Traffic Services (VTS) — assignment varies by zone; consult RAMN/notices."],
  ["21B / 25B / 83B", "—", "Continuous Marine Broadcast (CMB) — weather & NOTSHIP, receive only."],
  ["WX1 / WX2 / WX3", "162.550 / .400 / .475", "Weatheradio Canada continuous marine weather."],
];

function renderRadio() {
  let html = '<h2>Distress & urgency scripts</h2>';

  html += `<div class="card" data-search="mayday distress script grave imminent danger">
    <div class="card-title">🔴 MAYDAY — grave & imminent danger</div>
    <div class="card-sub">Ch 16 · HIGH power · Only when life or vessel is in grave and imminent danger.</div>
    <div class="script"><b>MAYDAY, MAYDAY, MAYDAY</b>
THIS IS <i>[vessel name ×3, call sign]</i>
<b>MAYDAY</b> <i>[vessel name, call sign]</i>
POSITION <i>[lat/long or bearing & distance from a known point]</i>
NATURE OF DISTRESS <i>[sinking, fire, MOB…]</i>
ASSISTANCE REQUIRED
<i>[persons on board, injuries, vessel description]</i>
OVER</div>
    <div class="card-note">DSC-equipped: press & hold the red DISTRESS button ≥ 5 s first, then voice MAYDAY on 16.</div>
  </div>`;

  html += `<div class="card" data-search="pan pan urgency script safety of vessel person">
    <div class="card-title">🟠 PAN PAN — urgency</div>
    <div class="card-sub">Ch 16 · Safety of vessel or person at risk, but not grave and imminent (e.g. disabled & drifting, medical advice needed).</div>
    <div class="script"><b>PAN PAN, PAN PAN, PAN PAN</b>
ALL STATIONS (or specific station) ×3
THIS IS <i>[vessel name ×3, call sign]</i>
POSITION <i>[…]</i> · <i>[nature of urgency]</i> · <i>[assistance wanted]</i>
OVER</div>
  </div>`;

  html += `<div class="card" data-search="securite safety navigation warning weather">
    <div class="card-title">🟢 SÉCURITÉ — safety</div>
    <div class="card-sub">Announce on Ch 16, pass the message on a working channel. Important navigational or meteorological warnings (debris, extinguished light, tow restricting a channel…).</div>
    <div class="script"><b>SÉCURITÉ, SÉCURITÉ, SÉCURITÉ</b>
ALL STATIONS ×3 · THIS IS <i>[vessel ×3, call sign]</i>
LISTEN CHANNEL <i>[working ch]</i> FOR NAVIGATIONAL WARNING
OUT</div>
  </div>`;

  html += '<h2>Canadian VHF channels</h2>';
  html += `<div class="card" data-search="vhf channels canada 16 70 06 13 83a 22a weather wx cmb vts"><table>
    <tr><th>Ch</th><th>MHz</th><th>Use</th></tr>
    ${VHF_CHANNELS.map(([c, f, u]) => `<tr><td class="ch">${c}</td><td style="white-space:nowrap">${f}</td><td>${u}</td></tr>`).join('')}
  </table>
  <div class="card-note">ROC-M certificate required to operate a marine VHF in Canada. Channel assignments vary by area — verify in the Radio Aids to Marine Navigation (RAMN).</div></div>`;

  html += '<h2>Phonetic alphabet & Morse</h2>';
  const phon = [
    ["A","Alfa","·−"],["B","Bravo","−···"],["C","Charlie","−·−·"],["D","Delta","−··"],
    ["E","Echo","·"],["F","Foxtrot","··−·"],["G","Golf","−−·"],["H","Hotel","····"],
    ["I","India","··"],["J","Juliett","·−−−"],["K","Kilo","−·−"],["L","Lima","·−··"],

  html += '<h2>Numbers & prowords</h2>';

  html += card("Common prowords", "OVER — my transmission ended, reply expected · OUT — exchange ended, no reply expected · ROGER — received & understood · WILCO — will comply · SAY AGAIN — repeat · SEELONCE MAYDAY — imposed radio silence during distress · SEELONCE FEENEE — distress traffic ended");

  html += '<div class="footer-note">Distress procedure per the Radiocommunication Regulations & RIC-21. Never transmit a false distress — it is an offence.</div>';
  el('sec-radio').innerHTML = html;

function calcSDT() {
  const d = parseFloat(el('sdt-d').value);
  const s = parseFloat(el('sdt-s').value);
  const t = parseFloat(el('sdt-t').value);
  const out = el('sdt-out');
  out.style.display = 'block';
  const fmtT = h => {
    const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
    return `${hh} h ${String(mm).padStart(2, '0')} min`;
  };
  if (!isNaN(d) && !isNaN(s) && s > 0) {
    const hours = d / s;
    const eta = new Date(Date.now() + hours * 3600e3);
    out.innerHTML = `Time: <b>${fmtT(hours)}</b><br>ETA (from now): <b>${eta.toLocaleString([], { weekday: 'short', hour: '2-digit', minute: '2-digit' })}</b>`;
    el('sdt-t').value = (Math.round(hours * 100) / 100);
  } else if (!isNaN(d) && !isNaN(t) && t > 0) {
    out.innerHTML = `Required speed: <b>${(d / t).toFixed(1)} kn</b>`;
    el('sdt-s').value = (d / t).toFixed(1);
  } else if (!isNaN(s) && !isNaN(t)) {
    out.innerHTML = `Distance covered: <b>${(s * t).toFixed(1)} nm</b>`;
    el('sdt-d').value = (s * t).toFixed(1);
  } else {
    out.innerHTML = 'Enter any two of the three values.';
  }
}

/* ---------- CIP passage time calculator ---------- */
let cipDir = 'up';

const fmtHM = hours => {
  const total = Math.round(hours * 60);
  return `${Math.floor(total / 60)}:${String(total % 60).padStart(2, '0')}`;
};

function setCipDir(dir) {
  cipDir = dir;
  el('cip-up').classList.toggle('on', dir === 'up');
  el('cip-down').classList.toggle('on', dir === 'down');
  const pts = CIP_ROUTES[dir].pts;
  el('cip-from').innerHTML = pts.map((p, i) => `<option value="${i}">${p[1]} · ${p[0]}</option>`).join('');
  el('cip-to').innerHTML = pts.map((p, i) => `<option value="${i}" ${i === pts.length - 1 ? 'selected' : ''}>${p[1]} · ${p[0]}</option>`).join('');
  el('cip-note').textContent = CIP_ROUTES[dir].note;
  renderCipChart();
  cipSpan();
}

function cipSpeed() {
  const s = parseFloat(el('cip-spd').value);
  return (s > 0 && s < 60) ? s : null;
}

function renderCipChart() {
  const spd = cipSpeed();
  const mode = el('cip-mode').value;
  const { label, pts } = CIP_ROUTES[cipDir];
  if (!spd) { el('cip-chart').innerHTML = '<div class="card-sub">Enter a speed between 0 and 60 kn.</div>'; return; }
  let cum = 0, totalNm = 0;
  const now = Date.now();
  const rows = pts.slice(0, -1).map((p, i) => {
    const [from, cip, dist, ch] = p;
    const to = pts[i + 1];
    const legH = dist / spd;
    cum += legH; totalNm += dist;
    const last = mode === 'eta'
      ? new Date(now + cum * 3600e3).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      : fmtHM(cum);
    return `<tr>
      <td><b>${from} → ${to[0]}</b><br><span class="ch">CIP ${cip} · Ch ${ch}</span></td>
      <td style="text-align:right">${dist.toFixed(1)}</td>
      <td style="text-align:right">${fmtHM(legH)}</td>
      <td style="text-align:right"><b>${last}</b></td>
    </tr>`;
  }).join('');
  el('cip-chart').innerHTML = `
    <div class="card-sub" style="margin-bottom:6px"><b>${label}</b> · ${spd} kn</div>
    <table>
      <tr><th>Leg</th><th style="text-align:right">NM</th><th style="text-align:right">Leg</th><th style="text-align:right">${mode === 'eta' ? 'ETA' : 'Elapsed'}</th></tr>
      ${rows}
      <tr><td><b>Total</b></td><td style="text-align:right"><b>${totalNm.toFixed(1)}</b></td><td></td><td style="text-align:right"><b>${mode === 'eta' ? new Date(now + (totalNm / spd) * 3600e3).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : fmtHM(totalNm / spd)}</b></td></tr>
    </table>`;
  cipSpan();
}

function cipSpan() {
  const spd = cipSpeed();
  const out = el('cip-span-out');
  const a = parseInt(el('cip-from').value), b = parseInt(el('cip-to').value);
  if (isNaN(a) || isNaN(b) || !spd) { out.style.display = 'none'; return; }
  out.style.display = 'block';
  if (a >= b) { out.innerHTML = '“From” must come before “To” along the route.'; return; }
  const pts = CIP_ROUTES[cipDir].pts;
  let nm = 0;
  for (let i = a; i < b; i++) nm += pts[i][2];
  const h = nm / spd;
  const eta = new Date(Date.now() + h * 3600e3);
  out.innerHTML = `${pts[a][0]} → ${pts[b][0]}: <b>${nm.toFixed(1)} nm</b> · <b>${fmtHM(h)}</b> at ${spd} kn<br>ETA (from now): <b>${eta.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</b>`;
}

function buildUnits() {
  const cat = el('cv-cat').value;
  const sel = el('cv-unit');
  if (cat === 'Temperature') {
    sel.innerHTML = '<option>°C</option><option>°F</option>';
  } else {
    sel.innerHTML = Object.keys(UNITS[cat].u).map(u => `<option>${u}</option>`).join('');
  }
}

function convert() {
  const cat = el('cv-cat').value, from = el('cv-unit').value;
  const v = parseFloat(el('cv-val').value);
  const out = el('cv-out');
  if (isNaN(v)) { out.textContent = 'Enter a value above.'; return; }
  const fmt = x => x >= 100 ? x.toFixed(1) : x >= 1 ? x.toFixed(2) : x.toFixed(4);
  if (cat === 'Temperature') {
    const c = from === '°C' ? v : (v - 32) * 5 / 9;
    out.innerHTML = `<b>${fmt(c)}</b> °C &nbsp;·&nbsp; <b>${fmt(c * 9 / 5 + 32)}</b> °F`;
    return;
  }
  const def = UNITS[cat];
  const base = v * def.u[from];
  out.innerHTML = Object.entries(def.u)
    .map(([u, f]) => `<b>${fmt(base / f)}</b> ${u}`).join('<br>');
}

function showQuestion() {
  const { order, i, score } = quizState;
  const area = el('quiz-area');
  if (i >= order.length) {

    area.innerHTML = `<div class="quiz-q" style="text-align:center">${pct >= 70 ? '✅' : '📚'} ${score} / ${order.length} (${pct}%)</div>

    return;
  }
  const [cat, q, opts, ans] = order[i];
  const shuffled = opts.map((o, idx) => ({ o, correct: idx === ans })).sort(() => Math.random() - 0.5);
  area.innerHTML = `
    <div class="quiz-meta"><span class="quiz-cat">${cat}</span><span>Q ${i + 1} of ${order.length} · Score ${score}</span></div>
    <div class="quiz-q">${q}</div>
    ${shuffled.map((s, idx) => `<button class="quiz-opt" data-c="${s.correct ? 1 : 0}" onclick="answer(this)">${s.o}</button>`).join('')}`;
}

function answer(btn) {
  if (btn.parentElement.dataset.done) return;
  btn.parentElement.dataset.done = "1";
  const correct = btn.dataset.c === "1";
  if (correct) quizState.score++;
  document.querySelectorAll('.quiz-opt').forEach(b => {
    if (b.dataset.c === "1") b.classList.add('correct');
    else if (b === btn) b.classList.add('wrong');
    b.disabled = true;
  });
  setTimeout(() => { quizState.i++; delete el('quiz-area').dataset.done; showQuestion(); }, correct ? 700 : 1600);
}

/* ============================================================
   Navigation, theme, search
   ============================================================ */
const SEARCHABLE = { rules: 1, radio: 1, cip: 1, buoys: 1, tools: 1 };

function go(sec) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  el('sec-' + sec).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.sec === sec));
  el('searchbar').style.display = SEARCHABLE[sec] ? 'block' : 'none';
  el('searchInput').value = '';
  filterCards('');
  window.scrollTo(0, 0);
  localStorage.setItem('wh-sec', sec);
}

function filterCards(q) {
  q = q.trim().toLowerCase();
  const active = document.querySelector('.section.active');
  if (!active) return;
  active.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('hidden', q && !(c.dataset.search || c.textContent.toLowerCase()).includes(q));
  });
  active.querySelectorAll('h2').forEach(h => {
    let sib = h.nextElementSibling, any = false;
    while (sib && sib.tagName !== 'H2') { if (sib.classList && sib.classList.contains('card') && !sib.classList.contains('hidden')) any = true; sib = sib.nextElementSibling; }
    h.style.display = any ? '' : 'none';
  });
}

const THEMES = [["dusk", "🌘 Dusk"], ["day", "☀️ Day"], ["night", "🔴 Night"]];
function cycleTheme() {
  const cur = document.body.dataset.theme;
  const i = (THEMES.findIndex(t => t[0] === cur) + 1) % THEMES.length;
  applyTheme(THEMES[i][0]);
}
function applyTheme(name) {
  document.body.dataset.theme = name;
  el('themeBtn').textContent = THEMES.find(t => t[0] === name)[1];
  localStorage.setItem('wh-theme', name);
  const meta = document.querySelector('meta[name="theme-color"]');
  meta.content = getComputedStyle(document.body).getPropertyValue('--bg').trim();
}

/* ---------- boot ---------- */
renderRules(); renderRadio(); renderCIP(); renderBuoys(); renderTools(); renderStudy();
applyTheme(localStorage.getItem('wh-theme') || 'dusk');
go(localStorage.getItem('wh-sec') || 'radio');

if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
